<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Palavra Secreta</title>
    <link rel="stylesheet" href="css/style.css">

</head>
<body>

    <main class="container">
        <h1>Palavra Secreta</h1>

        <section id="secaotentativa">
            <div class="palavra">_ _ _ _ _</div>
        </section>
        
    <form id="formlista">
        <input type="text" maxlength="1" placeholder="Letra">
        <button type="submit">Enviar</button>
    </form>

    <section class="info-jogo">
        <p id="tentativas">Tentativas Restantes: 5</p>
        <p id="pontuacao">Pontuação: 0</p>
        <p id="letraserradas">Letras erradas: </p>
        <p id="erros">erros: </p>
    </section>

    <div class="barra">
        <div class="progresso"></div>
    </div>

    </main>
</body>
</html>
